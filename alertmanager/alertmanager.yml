global:
  # these have to be hardcoded for now, as alertmanager can't easily read .env files
  smtp_smarthost: 'smtp.example.de:587'
  smtp_from: 'alerts@example.de'
  smtp_auth_username: 'alerts@example.de'
  smtp_auth_password: 'changeme'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'email'

receivers:
  - name: 'email'
    email_configs:
      - to: '${ALERT_EMAIL_TO}'
        send_resolved: true
